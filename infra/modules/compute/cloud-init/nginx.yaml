#cloud-config
package_update: true
package_upgrade: false

packages:
  - nginx

write_files:
  - path: /tmp/index.html
    owner: root:root
    permissions: '0644'
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Nginx Static Site</title>
      </head>
      <body>
          <h1>vmss-azure-devops-infra</h1>
          <p>Deployed via Azure DevOps Pipelines — Terraform + VM Scale Set</p>
      </body>
      </html>

runcmd:
  - cp /tmp/index.html /var/www/html/index.html
  - systemctl enable nginx
  - systemctl restart nginx