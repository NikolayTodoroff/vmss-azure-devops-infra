trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  packageVersion: '1.0.$(Build.BuildId)'

steps:
  - task: UseDotNet@2
    displayName: 'Use .NET 8 SDK'
    inputs:
      packageType: 'sdk'
      version: '8.0.x'

  - task: NuGetAuthenticate@1
    displayName: 'Authenticate to Azure Artifacts feed'

  - script: |
      dotnet pack packages/SharedLib/SharedLib.csproj \
        --configuration $(buildConfiguration) \
        --output $(Build.ArtifactStagingDirectory) \
        /p:PackageVersion=$(packageVersion)
    displayName: 'Pack SharedLib'

  - script: |
      dotnet nuget push "$(Build.ArtifactStagingDirectory)/*.nupkg" \
        --source "vmss-devops-infra/vmssadoinfra-feed" \
        --api-key AzureDevOps
    displayName: 'Push to Azure Artifacts feed'